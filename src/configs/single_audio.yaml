# Configuration for Audio-Only Model
# Train audio encoder without video

model:
  modality: audio  # 'video' or 'audio'
  
  # Audio encoder configuration
  audio_encoder:
    type: pann_cnn10  # Options: resnet18, resnet50, mobilenet, efficientnet, pann_cnn10, pann_cnn14
    output_dim: 512
    sample_rate: 32000
    pretrained_path: /mnt/disk1/backup_user/hoang.pm/pretrained_models/audio/Cnn10_mAP=0.380.pth
    kwargs: {}
  
  # Classifier configuration
  classifier:
    num_classes: 4
    dropout: 0.3

# Data configuration
data:
  video_dir: /mnt/disk1/backup_user/hoang.pm/UFFIA_data/fixed/processed_video  # Not used for audio-only
  audio_dir: /mnt/disk1/backup_user/hoang.pm/UFFIA_data/fixed/processed_audio
  
  # Fixed splits for fair comparison (RECOMMENDED)
  # Create splits first: python scripts/create_fixed_splits.py --video_dir ./data/processed_video --audio_dir ./data/audio_dataset --output_dir ./data/splits
  split_file: /mnt/disk1/backup_user/hoang.pm/UFFIA_data/fixed/splits/splits.json  # Set to null for dynamic splitting
  
  # Dynamic splitting parameters (only used if split_file is null or not found)
  seed: 42
  test_sample_per_class: 700  # Samples per class for test/val splits
  
  batch_size: 32
  num_workers: 4
  audio_duration: 2.0  # Audio duration in seconds
  sample_rate: 32000   # Audio sample rate
  class_names: ['none', 'weak', 'medium', 'strong']

# Training configuration
training:
  epochs: 100
  learning_rate: 0.0001
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 5
  gradient_clip: 1.0
  
  # Mixed precision training
  mixed_precision: true
  
  # Checkpoint configuration (saves best and last only)
  checkpoint_dir: ./checkpoints/audio_only_cnn10
  
  # Early stopping
  early_stopping:
    enabled: true
    patience: 15
    min_delta: 0.001

# Logging configuration
logging:
  use_wandb: true
  wandb_project: single_modality_experiments
  wandb_entity: null
  log_every: 10
  
# Evaluation configuration  
evaluation:
  test_batch_size: 64
  save_predictions: true
  save_confusion_matrix: true

# Hardware configuration
hardware:
  device: cuda
  gpu_id: 0
  deterministic: true
  seed: 42
